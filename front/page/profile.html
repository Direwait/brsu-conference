<div id="settings">
    
    <div id="profile">
        <div>
            <p><b>ФИО</b></p>
            <p id="name"></p>
        </div>
        <div>
            <p><b>Ученая степень, звание</b></p>
            <p id="degree"></p>
        </div>
        <div>
            <p><b>Место работы, адрес</b></p>
            <p id="place-of-work"></p>
        </div>
        <div>
            <p><b>Должность</b></p>
            <p id="job-title"></p>
        </div>
        <div>
            <p><b>Электронная почта</b></p>
            <p id="email"></p>
        </div>
    </div>

    <div class="form" id="reg-form">
        <h3>Настройки</h3>
        <h4>(заполнять необходимо только те поля, которые нужно изменить)</h4>
        <div>
            <div>
                <p><b>Фамилия</b></p>
                <p><input type="text" id="surname"></p>
            </div>
            <div>
                <p><b>Имя</b></p>
                <p><input type="text" id="name"></p>
            </div>
            <div>
                <p><b>Отчество</b></p>
                <p><input type="text" id="fathername"></p>
            </div>
        </div>
        <div>

            <div>
                <p><b>Учёная степень</b></p>
                <p>
                    <select name="degree" class="reg-select" id="select-degree">
                        <option selected disabled hidden value="">Выберите учёную степень</option>
                        <option value="candidate">Кандидат наук</option>
                        <option value="doctor">Доктор наук</option>
                        <option value="none">Нет</option>
                    </select>
                </p>
            </div>
            <div>
                <p><b>Учёное звание</b></p>
                <p>
                    <select name="title" class="reg-select" id="select-title">
                        <option selected disabled hidden value="">Выберите учёное звание</option>
                        <option value="docent">Доцент</option>
                        <option value="professor">Профессор</option>
                        <option value="none">Нет</option>
                    </select>
                </p>
            </div>
            <div>
                <p><b>Место работы и его адрес</b></p>
                <p><input type="text" id="place-of-work"></p>
            </div>
        </div>
        <div>
            <div>
                <p><b>Должность</b></p>
                <p><input type="text" id="job-title"></p>
            </div>
            <div>
                <p><b>Электронная почта</b></p>
                <p><input type="text" id="email"></p>
            </div>
            <div>
                <p><b>Пароль</b></p>
                <p><input type="password" id="password"></p>
            </div>
            <div>
                <p><b>Подтверждение пароля</b></p>
                <p><input type="password" id="repeat-password"></p>
            </div>
        </div>
    </div>
    
    <input class="form-button" id="reg-button" type="button" onclick="changeSettings()" value="Сохранить">
    
    <div>
        <input value="выйти из аккаунта" type="button" onclick="logout()">
    </div>
    
    <div class="message hidden"></div>
</div>
