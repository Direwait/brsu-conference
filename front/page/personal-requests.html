<div class="form-request">
    <h2>Добавление новой заявки</h2><br>
    <div class="form-add-request">
        <label> Потребность в жилье        
            <input id="housing_need" type="checkbox">        
        </label>
        <br>

        <div class="form-add-report">
            <label>Название доклада:</label>
            <input autocomplete="off" id="report_title">
            <br>

            <label>Авторы:</label>
            <input autocomplete="off" id="report_authors" placeholder="Иванов Антон Иванович ...">
            <br>

            
            <label>Формы доклада:</label>
            <select autocomplete="off" id="report_form">
                 <option value="offline">Очное</option>
                 <option value="online">Онлайн</option>
            </select>
            <br>

            <label>Научное направление:</label>
            <input autocomplete="off" id="scientific_direction">
            <br>

            <input required autocomplete="off" id="report_file" type="file">
            <br>
            <button style="background-color: red; display: none;" onclick="deleteReport()">Удалить доклад</button>
            <br>
        </div>
            <button onclick="addReportForm()" style="background-color: rgb(53, 102, 95);" >Добавить еще один доклад</button>
            <button onclick="addReport()">Добавить заявку</button>
    </div>
</div>
<br>

<div class="request-list">
    
</div>
