version: 'latest'

services:
  mysql:
    image: mysql:latest
    container_name: conf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: conf_brsu
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  server:
    build: ./
    container_name: conf-server
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql        # важно: имя сервиса из docker-compose
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: conf_brsu
      PORT: 5000

volumes:
  mysql_data: